<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}THEOBROMA{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://unpkg.com/smiles-drawer@2.1.6/dist/smiles-drawer.min.js"></script>
</head>
<body>
<header>
    <div class="header-inner">
        <a href="/" class="logo"><img src="{{ url_for('static', filename='logo.png') }}" alt="THEOBROMA" class="logo-icon-img"><span class="logo-text">THEOBROMA</span></a>
        <nav>
            <a href="/">Home</a>
            <a href="/search">Search</a>
            <a href="/browse">Browse</a>
            <a href="/statistics">Statistics</a>
            <a href="/download">Download</a>
            <a href="/similarity">Similarity</a>
            <a href="/help">Help</a>
            <a href="/api/search?q=curcumin&type=name&limit=5" class="nav-api">API</a>
        </nav>
    </div>
</header>
<main>{% block content %}{% endblock %}</main>
<footer>
    <div class="footer-inner">
        <div class="footer-left">
            <p><strong>THEOBROMA</strong> &mdash; An open multi-kingdom natural products database</p>
            <p>Hosted by <a href="https://www.l3s.de">L3S Research Center</a>, Leibniz University Hannover</p>
        </div>
        <div class="footer-right">
            <p><a href="https://github.com/ThorKlm/theobroma">GitHub</a> &middot;
               <a href="/help#cite">How to Cite</a> &middot;
               <a href="/help#license">License</a></p>
            <p class="footer-license">CC BY 4.0 / CC BY-NC 4.0</p>
        </div>
    </div>
</footer>
<script>
// Keyboard shortcut: / focuses search
document.addEventListener('keydown', function(e) {
    if (e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
        e.preventDefault();
        var s = document.querySelector('input[name="q"]');
        if (s) s.focus();
    }
});
</script>
</body>
</html>
