  multi_source_stripped: 27003
enrichment:
- name: LOTUS
  source: https://zenodo.org/records/7534071
  file: 260413_frozen_metadata.csv.gz
  method: InChIKey matching
  added: 64k organisms, 146k names, 176k DOIs, 155k NP classes, 174k ClassyFire
- name: COCONUT 2.0 SQL dump
  source: https://zenodo.org/records/13373880
  file: coconut-09-2024.sql.zip (1.9 GB)
  method: Streaming COPY block extraction to TSV
  script: extract_coconut_meta.py
  added: 13.5k organisms, 129k names, 114k DOIs, 27k regions
- name: PubChem synonyms
  source: https://pubchem.ncbi.nlm.nih.gov/rest/pug
  method: Individual InChIKey GET queries (~18h, 1.57 it/s)
  added: 348,487 synonyms for 83,808 compounds
- name: GBIF species occurrences
  source: https://api.gbif.org/v1
  method: Species match + occurrence country lookup
  added: 17,689 geographic regions
- name: NPClassifier batch
  source: https://zenodo.org/records/5068687
  models: NP_classifier_class_V1.hdf5, NP_classifier_superclass_V1.hdf5, NP_classifier_pathway_V1.hdf5
  method: Dual-input fingerprints (2048-d formula + 4096-d binary)
  added: 196,201 class annotations, 1,042,831 pathway annotations
- name: XGBoost inferred classification
  method: Per-class XGBoost on Morgan 2048-d + MACCS 167-d + ChemBERTa 256-d PCA
  hpo: Optuna, 2 seeds (0,1), 50 trials each, 30 representative classes
  best_params:
    max_depth: 9
    learning_rate: 0.21
    subsample: 1.0
    colsample_bytree: 0.3
    min_child_weight: 2
    lambda: 6.8
    alpha: 6.7
    weight_mode: sqrt
    n_rounds: 100
  evaluation:
    micro_f1: 0.7806
    macro_f1: 0.7457
  added: 495,143 inferred class annotations
- name: ADMET-AI
  source: https://github.com/swansonk14/admet_ai
  method: Chemprop D-MPNN ensemble
  endpoints: 104
  added: ADMET predictions for all compounds
- name: ChemBERTa embeddings
  model: seyonec/ChemBERTa-zinc-base-v1
  method: CLS token extraction, 768-d
  index: FAISS HNSW (M=32, efConstruction=200, efSearch=128)
- name: SEA-style target predictions
  source: ChEMBL v34 known actives
  method: Max Morgan Tanimoto against known ligand sets
  targets: 25
  threshold: Tc >= 0.5
pipeline:
  python: '3.13'
  rdkit: '2024.03'
  pandas: '2.2'
  scipy: '1.13'
  xgboost: '2.1'
  transformers: '4.40'
  faiss: '1.8'
  optuna: '3.6'
  admet_ai: '1.3'
  postgresql: '17'
